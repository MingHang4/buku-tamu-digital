name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Start database for testing
        run: |
          docker run -d --name test-db \
            -e POSTGRES_USER=$POSTGRES_USER \
            -e POSTGRES_PASSWORD=$POSTGRES_PASSWORD \
            -e POSTGRES_DB=$POSTGRES_DB \
            -p 5433:5432 \
            -v ${{ github.workspace }}/backend/init.sql:/docker-entrypoint-initdb.d/init.sql \
            postgres:16-alpine
          echo "Waiting for Postgres to accept connections..."
          for i in $(seq 1 30); do
            docker exec test-db pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" && break
            sleep 2
          done
          docker logs test-db --tail 100 || true

      - name: Run backend automated tests
        working-directory: ./backend
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5433

      - name: Stop temporary test database
        run: docker rm -f test-db || true

      - name: Build backend Docker image
        run: docker build -t buku-tamu-backend:latest ./backend

      - name: Build frontend Docker image
        run: docker build -t buku-tamu-frontend:latest ./frontend

      - name: Build Docker Compose stack
        run: |
          docker compose up -d --build
          docker compose ps

      - name: Verify backend health
        run: |
          echo "Waiting for backend /health to become available..."
          for i in $(seq 1 30); do
            if curl --silent --fail http://localhost:4000/health; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend health check failed after retries"
          docker compose logs backend --tail 100
          exit 1

      - name: Cleanup test database
        if: always()
        run: docker rm -f test-db || true
